<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <title>VitaCompanion — Saúde com IA</title>
  
  <!-- Open Graph (preview no WhatsApp/Insta) -->
  <meta property="og:title" content="VitaCompanion — IA pra sua saúde" />
  <meta property="og:description" content="Alimentação, treino, sono e stress personalizados com IA. Use meu código!" />
  <meta property="og:type" content="website" />
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --teal: #1D9E75;
      --teal-deep: #085041;
      --teal-mist: #E1F5EE;
      --purple: #7F77DD;
      --purple-deep: #3C3489;
      --purple-mist: #EEEDFE;
      --amber: #EF9F27;
      --gray-text: #555;
      --gray-muted: #888;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--teal-mist) 0%, #FFFFFF 50%);
      color: #222;
      min-height: 100vh;
      padding: 16px;
    }
    
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    
    .hero {
      text-align: center;
      padding: 28px 16px;
    }
    
    .hero .emoji {
      font-size: 56px;
      margin-bottom: 12px;
    }
    
    .hero h1 {
      font-size: 24px;
      color: var(--teal-deep);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    
    .hero p {
      color: var(--gray-text);
      font-size: 14px;
    }
    
    .code-card {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%);
      color: #FFF;
      padding: 24px 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(127,119,221,0.25);
    }
    
    .code-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.85;
      margin-bottom: 8px;
    }
    
    .code-card .code {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.15em;
      font-family: "Courier New", monospace;
      margin-bottom: 12px;
    }
    
    .btn-copy {
      background: rgba(255, 255, 255, 0.2);
      color: #FFF;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .btn-copy:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .btn-copy.copied {
      background: #FFF;
      color: var(--purple-deep);
    }
    
    .card {
      background: #FFF;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      margin-bottom: 14px;
    }
    
    .card h3 {
      font-size: 16px;
      color: var(--teal-deep);
      margin-bottom: 12px;
    }
    
    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .pillar {
      background: var(--teal-mist);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    
    .pillar .icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    
    .pillar .label {
      font-size: 12px;
      color: var(--teal-deep);
      font-weight: 600;
    }
    
    .steps {
      list-style: none;
      padding: 0;
    }
    
    .step {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #F0F0F0;
    }
    
    .step:last-child {
      border-bottom: none;
    }
    
    .step-number {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--purple);
      color: #FFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }
    
    .step-content h4 {
      font-size: 14px;
      color: var(--purple-deep);
      margin-bottom: 2px;
    }
    
    .step-content p {
      font-size: 12px;
      color: var(--gray-text);
      line-height: 1.5;
    }
    
    .btn-store {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    
    .btn-store:hover {
      opacity: 0.9;
    }
    
    .btn-play {
      background: #000;
      color: #FFF;
    }
    
    .btn-apple {
      background: #FFF;
      color: #000;
      border: 1.5px solid #DDD;
    }
    
    .footer {
      text-align: center;
      padding: 20px 16px;
      color: var(--gray-muted);
      font-size: 11px;
    }
    
    .footer a {
      color: var(--purple);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="hero">
      <div class="emoji">🌿</div>
      <h1>Você foi indicado!</h1>
      <p>Conheça o VitaCompanion</p>
    </div>
    
    <div id="content"></div>
    
    <div class="footer">
      <a href="https://rcbarella.github.io/vitacompanion-legal/privacy.html">Privacidade</a>
      ·
      <a href="https://rcbarella.github.io/vitacompanion-legal/termos.html">Termos</a>
      <br />
      <span>VitaCompanion © 2026</span>
    </div>
    
  </div>
  
  <script>
    // URLs das lojas
    const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.vitacompanion.app";
    const APP_STORE_URL = "https://apps.apple.com/br/app/vitacompanion/idXXXXXXXXXX";
    
    // Detecta plataforma
    function detectarPlataforma() {
      const ua = navigator.userAgent || "";
      if (/android/i.test(ua)) return "android";
      if (/iPhone|iPad|iPod/i.test(ua)) return "ios";
      return "desktop";
    }
    
    // Pega código da URL
    function getCodigo() {
      const params = new URLSearchParams(window.location.search);
      const c = params.get("c") || params.get("codigo");
      if (!c) return null;
      // Sanitiza
      const clean = c.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 20);
      if (clean.length < 5) return null;
      return clean;
    }
    
    // Escape XSS
    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    
    // Copia código
    function copiar(texto, btnEl) {
      const original = btnEl.textContent;
      const tryCopy = () => navigator.clipboard.writeText(texto)
        .then(() => {
          btnEl.textContent = "✓ Copiado!";
          btnEl.classList.add("copied");
          setTimeout(() => {
            btnEl.textContent = original;
            btnEl.classList.remove("copied");
          }, 2000);
        });
      
      if (navigator.clipboard) {
        tryCopy().catch(() => alert("Copie manualmente: " + texto));
      } else {
        alert("Copie o código: " + texto);
      }
    }
    
    // Render
    function renderizar() {
      const codigo = getCodigo();
      const plataforma = detectarPlataforma();
      
      const lojaButtons = plataforma === "ios"
        ? `<a href="${APP_STORE_URL}" class="btn-store btn-apple"> Baixar na App Store</a>`
        : plataforma === "android"
          ? `<a href="${PLAY_STORE_URL}" class="btn-store btn-play">▶ Baixar no Google Play</a>`
          : `<a href="${PLAY_STORE_URL}" class="btn-store btn-play">▶ Baixar no Google Play</a>
             <a href="${APP_STORE_URL}" class="btn-store btn-apple"> Baixar na App Store</a>`;
      
      // Se não tem código válido, mostra página genérica
      if (!codigo) {
        document.getElementById("content").innerHTML = `
          <div class="card">
            <h3>🌟 Sobre o VitaCompanion</h3>
            <p style="font-size: 14px; color: var(--gray-text); line-height: 1.6; margin-bottom: 14px;">
              IA personalizada nas 4 dimensões da sua saúde:
            </p>
            <div class="pillars">
              <div class="pillar"><div class="icon">🥗</div><div class="label">Alimentação</div></div>
              <div class="pillar"><div class="icon">💪</div><div class="label">Treino</div></div>
              <div class="pillar"><div class="icon">🌙</div><div class="label">Sono</div></div>
              <div class="pillar"><div class="icon">🧘</div><div class="label">Stress</div></div>
            </div>
          </div>
          
          <div class="card">
            <h3>📱 Baixe o app</h3>
            ${lojaButtons}
          </div>
        `;
        return;
      }
      
      // Tem código válido
      document.getElementById("content").innerHTML = `
        <div class="code-card">
          <div class="label">Seu código de indicação</div>
          <div class="code">${escapeHtml(codigo)}</div>
          <button class="btn-copy" id="btn-copy-code">📋 Copiar código</button>
        </div>
        
        <div class="card">
          <h3>🌟 O que é o VitaCompanion?</h3>
          <p style="font-size: 14px; color: var(--gray-text); line-height: 1.6; margin-bottom: 14px;">
            Seu companheiro de IA para as <strong>4 dimensões da saúde</strong>: planos personalizados de alimentação, treino, sono e gestão de stress.
          </p>
          <div class="pillars">
            <div class="pillar"><div class="icon">🥗</div><div class="label">Alimentação</div></div>
            <div class="pillar"><div class="icon">💪</div><div class="label">Treino</div></div>
            <div class="pillar"><div class="icon">🌙</div><div class="label">Sono</div></div>
            <div class="pillar"><div class="icon">🧘</div><div class="label">Stress</div></div>
          </div>
          <p style="font-size: 12px; color: var(--gray-muted); margin-top: 10px; text-align: center;">
            ✨ 15 dias grátis · Cancele quando quiser
          </p>
        </div>
        
        <div class="card">
          <h3>📱 Como usar seu código</h3>
          <ol class="steps">
            <li class="step">
              <div class="step-number">1</div>
              <div class="step-content">
                <h4>Baixe o app</h4>
                <p>Use os botões abaixo. Disponível para Android (iOS em breve).</p>
              </div>
            </li>
            <li class="step">
              <div class="step-number">2</div>
              <div class="step-content">
                <h4>Crie sua conta</h4>
                <p>Cadastro rápido, sem cartão de crédito.</p>
              </div>
            </li>
            <li class="step">
              <div class="step-number">3</div>
              <div class="step-content">
                <h4>Use seu código</h4>
                <p>No campo "Código de embaixador" do cadastro, digite <strong>${escapeHtml(codigo)}</strong>.</p>
              </div>
            </li>
            <li class="step">
              <div class="step-number">4</div>
              <div class="step-content">
                <h4>Aproveite!</h4>
                <p>15 dias grátis pra explorar o VitaCompanion completo.</p>
              </div>
            </li>
          </ol>
        </div>
        
        <div class="card">
          <h3>📥 Baixar agora</h3>
          ${lojaButtons}
        </div>
      `;
      
      // Bind do botão copiar
      const btnCopy = document.getElementById("btn-copy-code");
      if (btnCopy) {
        btnCopy.addEventListener("click", () => copiar(codigo, btnCopy));
      }
    }
    
    renderizar();
  </script>
</body>
</html>
