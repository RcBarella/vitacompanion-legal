<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7F77DD" />
  <title>Convite de Embaixador — VitaCompanion</title>
  
  <!-- Open Graph -->
  <meta property="og:title" content="Você foi convidado! — VitaCompanion" />
  <meta property="og:description" content="Faça parte do programa de embaixadores VitaCompanion" />
  <meta property="og:type" content="website" />
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --purple: #7F77DD;
      --purple-deep: #3C3489;
      --purple-mist: #EEEDFE;
      --teal: #1D9E75;
      --teal-mist: #E1F5EE;
      --teal-deep: #085041;
      --amber: #EF9F27;
      --amber-mist: #FAEEDA;
      --red: #C92A2A;
      --red-mist: #FFF5F5;
      --gray-bg: #F8F9FA;
      --gray-border: #E0E0E0;
      --gray-text: #555;
      --gray-muted: #888;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--purple-mist) 0%, #FFFFFF 50%);
      color: #222;
      min-height: 100vh;
      padding: 16px;
    }
    
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      padding: 32px 16px;
    }
    
    .header h1 {
      font-size: 28px;
      color: var(--purple-deep);
      margin-bottom: 6px;
    }
    
    .header p {
      color: var(--gray-text);
      font-size: 14px;
    }
    
    .card {
      background: #FFF;
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--purple-deep);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 30px 20px;
      color: var(--gray-muted);
    }
    
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--gray-border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error-card {
      background: var(--red-mist);
      border: 1.5px solid var(--red);
      color: var(--red);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .error-card h3 {
      margin-bottom: 8px;
    }
    
    .error-card p {
      font-size: 13px;
      color: #7C1010;
    }
    
    .code-display {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%);
      color: #FFF;
      padding: 24px 20px;
      border-radius: 12px;
      text-align: center;
      margin: 16px 0;
    }
    
    .code-display .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.85;
      margin-bottom: 8px;
    }
    
    .code-display .code {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.15em;
      font-family: "Courier New", monospace;
      margin-bottom: 12px;
    }
    
    .btn-copy {
      background: rgba(255, 255, 255, 0.2);
      color: #FFF;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .btn-copy:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .btn-copy.copied {
      background: #FFF;
      color: var(--purple-deep);
    }
    
    .steps {
      counter-reset: step;
    }
    
    .step {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
      align-items: flex-start;
    }
    
    .step-number {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--teal);
      color: #FFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    
    .step-content {
      flex: 1;
    }
    
    .step-content h4 {
      font-size: 14px;
      color: var(--teal-deep);
      margin-bottom: 4px;
    }
    
    .step-content p {
      font-size: 13px;
      color: var(--gray-text);
      line-height: 1.5;
    }
    
    .btn-store {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    
    .btn-store:hover {
      opacity: 0.9;
    }
    
    .btn-play {
      background: #000;
      color: #FFF;
    }
    
    .btn-apple {
      background: #FFF;
      color: #000;
      border: 1.5px solid #DDD;
    }
    
    .btn-deeplink {
      background: var(--purple);
      color: #FFF;
      border: none;
      cursor: pointer;
    }
    
    .info-pill {
      background: var(--teal-mist);
      color: var(--teal-deep);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 8px;
    }
    
    .footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--gray-muted);
      font-size: 11px;
    }
    
    .footer a {
      color: var(--purple);
      text-decoration: none;
    }
    
    @media (max-width: 380px) {
      .code-display .code {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h1>🌟 Você foi convidado!</h1>
      <p>Programa de Embaixadores VitaCompanion</p>
    </div>
    
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>Verificando convite...</span>
      </div>
    </div>
    
    <div class="footer">
      <a href="https://rcbarella.github.io/vitacompanion-legal/privacy.html">Política de Privacidade</a>
      ·
      <a href="https://rcbarella.github.io/vitacompanion-legal/termos.html">Termos de Uso</a>
      <br />
      <span>VitaCompanion © 2026</span>
    </div>
    
  </div>
  
  <script>
    // CONFIGURAÇÃO
    const API_BASE = "https://vitacompanion-production.up.railway.app"; 
    // ⚠️ AJUSTAR PRA URL DO RAILWAY REAL
    
    const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.vitacompanion.app";
    // ⚠️ ATUALIZAR QUANDO APP ESTIVER PUBLICADO
    
    const APP_STORE_URL = "https://apps.apple.com/br/app/vitacompanion/idXXXXXXXXXX";
    // ⚠️ FUTURO
    
    // DETECTA PLATAFORMA
    function detectarPlataforma() {
      const ua = navigator.userAgent || "";
      if (/android/i.test(ua)) return "android";
      if (/iPhone|iPad|iPod/i.test(ua)) return "ios";
      return "desktop";
    }
    
    // PEGA TOKEN DA URL
    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token");
    }
    
    // VALIDA O CONVITE COM O BACKEND
    async function validarConvite(token) {
      try {
        const res = await fetch(`${API_BASE}/api/ambassador/invite/validate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();
        return { status: res.status, data };
      } catch (err) {
        return { status: 0, data: { error: "Erro de conexão. Verifique sua internet." } };
      }
    }
    
    // COPIA TEXTO
    function copiar(texto, btnEl) {
      const original = btnEl.textContent;
      navigator.clipboard.writeText(texto).then(() => {
        btnEl.textContent = "✓ Copiado!";
        btnEl.classList.add("copied");
        setTimeout(() => {
          btnEl.textContent = original;
          btnEl.classList.remove("copied");
        }, 2000);
      }).catch(() => {
        alert("Copie manualmente: " + texto);
      });
    }
    
    // RENDERIZA O CONTEÚDO PRINCIPAL
    function renderizarConvite(invite) {
      const plataforma = detectarPlataforma();
      const expiresAt = new Date(invite.expiresAt).toLocaleDateString("pt-BR", {
        day: "2-digit", month: "long", year: "numeric"
      });
      
      const lojaButton = plataforma === "ios"
        ? `<a href="${APP_STORE_URL}" class="btn-store btn-apple"> Baixar na App Store</a>`
        : `<a href="${PLAY_STORE_URL}" class="btn-store btn-play">▶ Baixar no Google Play</a>`;
      
      // Se for desktop, mostra os dois
      const lojaButtons = plataforma === "desktop"
        ? `<a href="${PLAY_STORE_URL}" class="btn-store btn-play">▶ Baixar no Google Play</a>
           <a href="${APP_STORE_URL}" class="btn-store btn-apple"> Baixar na App Store</a>`
        : lojaButton;
      
      const greeting = invite.invitedName
        ? `Olá, <strong>${escapeHtml(invite.invitedName)}</strong>!`
        : "Olá!";
      
      document.getElementById("content").innerHTML = `
        <div class="card">
          <p style="text-align:center; font-size:15px; color:var(--gray-text); margin-bottom:8px;">
            ${greeting}
          </p>
          <p style="text-align:center; color:var(--gray-text); margin-bottom:16px; line-height:1.5;">
            Você foi convidado(a) a fazer parte do <strong>Programa de Embaixadores VitaCompanion</strong> — onde criadores de conteúdo de saúde e bem-estar ganham por indicar novos usuários.
          </p>
          
          <div style="text-align:center;">
            <span class="info-pill">⏰ Convite válido até ${expiresAt}</span>
          </div>
          
          <div class="code-display">
            <div class="label">Seu código de convite</div>
            <div class="code">${invite.shortCode}</div>
            <button class="btn-copy" id="btn-copy-code">📋 Copiar código</button>
          </div>
        </div>
        
        <div class="card">
          <h3 class="card-title">📱 Como aceitar o convite</h3>
          
          <div class="steps">
            <div class="step">
              <div class="step-number">1</div>
              <div class="step-content">
                <h4>Baixe o app VitaCompanion</h4>
                <p>Use os botões abaixo pra ir direto pra loja.</p>
              </div>
            </div>
            
            <div class="step">
              <div class="step-number">2</div>
              <div class="step-content">
                <h4>Toque em "Sou embaixador"</h4>
                <p>Na tela inicial do app, busca a opção de cadastro como embaixador.</p>
              </div>
            </div>
            
            <div class="step">
              <div class="step-number">3</div>
              <div class="step-content">
                <h4>Digite seu código</h4>
                <p>Cole o código <strong>${invite.shortCode}</strong> e preencha seus dados.</p>
              </div>
            </div>
            
            <div class="step">
              <div class="step-number">4</div>
              <div class="step-content">
                <h4>Aguarde aprovação</h4>
                <p>Em até 48h analisamos seu cadastro e te notificamos.</p>
              </div>
            </div>
          </div>
          
          <div style="margin-top:20px;">
            ${lojaButtons}
          </div>
        </div>
        
        <div class="card">
          <h3 class="card-title">💰 O que você ganha</h3>
          <ul style="list-style:none; padding:0;">
            <li style="padding:8px 0; border-bottom:1px solid var(--gray-border);">
              <strong style="color:var(--teal-deep);">R$ 13,95</strong>
              <span style="color:var(--gray-muted); font-size:13px;"> por novo assinante mensal</span>
            </li>
            <li style="padding:8px 0; border-bottom:1px solid var(--gray-border);">
              <strong style="color:var(--teal-deep);">R$ 41,85</strong>
              <span style="color:var(--gray-muted); font-size:13px;"> por novo assinante anual</span>
            </li>
            <li style="padding:8px 0; border-bottom:1px solid var(--gray-border);">
              <strong style="color:var(--teal-deep);">R$ 2,79 a R$ 28,40</strong>
              <span style="color:var(--gray-muted); font-size:13px;"> por renovação</span>
            </li>
            <li style="padding:8px 0;">
              <strong style="color:var(--teal-deep);">Pagamento via PIX</strong>
              <span style="color:var(--gray-muted); font-size:13px;"> a partir de R$ 50</span>
            </li>
          </ul>
          <p style="font-size:11px; color:var(--gray-muted); margin-top:12px; text-align:center;">
            Comissões liberadas após 30 dias do pagamento (período de garantia).
          </p>
        </div>
      `;
      
      // Bind do botão de copiar
      const btnCopy = document.getElementById("btn-copy-code");
      if (btnCopy) {
        btnCopy.addEventListener("click", () => copiar(invite.shortCode, btnCopy));
      }
    }
    
    // RENDERIZA ERRO
    function renderizarErro(mensagem, dica) {
      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="error-card">
            <h3>❌ Convite inválido</h3>
            <p>${escapeHtml(mensagem)}</p>
            ${dica ? `<p style="margin-top:12px; font-size:12px;">${escapeHtml(dica)}</p>` : ""}
          </div>
        </div>
        <div class="card">
          <h3 class="card-title">📩 Entre em contato</h3>
          <p style="font-size:13px; color:var(--gray-text); line-height:1.5;">
            Se você acha que isso é um erro, entre em contato com a pessoa que te enviou o convite.
            Pode ser que ele tenha expirado ou já tenha sido usado.
          </p>
        </div>
      `;
    }
    
    // ESCAPE HTML pra prevenir XSS
    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    
    // FLUXO PRINCIPAL
    async function init() {
      const token = getToken();
      
      if (!token) {
        renderizarErro(
          "Nenhum token de convite encontrado.",
          "Verifique se o link está completo."
        );
        return;
      }
      
      const result = await validarConvite(token);
      
      if (result.data?.ok && result.data?.invite) {
        renderizarConvite(result.data.invite);
        return;
      }
      
      // Erro
      const errorCode = result.data?.code;
      let mensagem = result.data?.error || "Convite não pôde ser verificado.";
      let dica = null;
      
      if (errorCode === "INVITE_EXPIRED") {
        mensagem = "Este convite expirou.";
        dica = "Peça pra quem te convidou gerar um novo.";
      } else if (errorCode === "INVITE_ACCEPTED") {
        mensagem = "Este convite já foi usado.";
        dica = "Se foi você que aceitou, é só baixar o app e fazer login!";
      } else if (errorCode === "INVITE_CANCELLED") {
        mensagem = "Este convite foi cancelado.";
        dica = "Entre em contato com quem te enviou.";
      } else if (errorCode === "INVITE_NOT_FOUND") {
        mensagem = "Convite não encontrado.";
        dica = "Confere se o link está completo. Pode ser que tenha sido digitado errado.";
      }
      
      renderizarErro(mensagem, dica);
    }
    
    // Inicia
    init();
  </script>
</body>
</html>
